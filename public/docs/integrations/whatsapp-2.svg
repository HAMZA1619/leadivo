<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="376" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="391" r="4" fill="#10b981"/><text x="42" y="395" font-size="12" fill="#10b981" font-weight="600">Integrations</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- WhatsApp setup page -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">WhatsApp</text>
<text x="210" y="94" font-size="11" fill="#6b7280">Send order confirmations to customers via WhatsApp when orders are placed.</text>
<!-- Connection section -->
<rect x="210" y="114" width="560" height="300" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="144" font-size="13" font-weight="600" fill="#1f2937">Connection</text>
<!-- Not connected state -->
<rect x="234" y="158" width="512" height="48" rx="8" fill="#fef3c7" stroke="#fde68a"/>
<circle cx="254" cy="182" r="6" fill="#f59e0b"/>
<text x="268" y="178" font-size="11" fill="#92400e" font-weight="500">Not connected</text>
<text x="268" y="194" font-size="10" fill="#92400e">Scan the QR code with WhatsApp to connect.</text>
<!-- QR code placeholder -->
<rect x="234" y="220" width="140" height="140" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<rect x="260" y="246" width="88" height="88" rx="4" fill="#1f2937"/>
<rect x="268" y="254" width="72" height="72" rx="2" fill="#ffffff"/>
<!-- QR grid pattern -->
<rect x="276" y="262" width="8" height="8" fill="#1f2937"/><rect x="288" y="262" width="8" height="8" fill="#1f2937"/><rect x="300" y="262" width="8" height="8" fill="#1f2937"/>
<rect x="276" y="274" width="8" height="8" fill="#1f2937"/><rect x="312" y="274" width="8" height="8" fill="#1f2937"/>
<rect x="276" y="286" width="8" height="8" fill="#1f2937"/><rect x="288" y="286" width="8" height="8" fill="#1f2937"/><rect x="300" y="286" width="8" height="8" fill="#1f2937"/>
<rect x="324" y="262" width="8" height="8" fill="#1f2937"/><rect x="324" y="286" width="8" height="8" fill="#1f2937"/>
<text x="304" y="370" font-size="9" fill="#6b7280" text-anchor="middle">Scan with WhatsApp</text>
<!-- Event selection -->
<text x="400" y="244" font-size="12" font-weight="600" fill="#1f2937">Events</text>
<text x="400" y="262" font-size="10" fill="#6b7280">Choose which events trigger WhatsApp notifications</text>
<!-- Event toggles -->
<rect x="400" y="276" width="322" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
<rect x="408" y="282" width="18" height="18" rx="9" fill="#10b981"/>
<circle cx="422" cy="291" r="5" fill="#ffffff"/>
<text x="434" y="296" font-size="10" fill="#1f2937">New order</text>

<rect x="400" y="312" width="322" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
<rect x="408" y="318" width="18" height="18" rx="9" fill="#d1d5db"/>
<circle cx="414" cy="327" r="5" fill="#ffffff"/>
<text x="434" y="332" font-size="10" fill="#1f2937">Order status changed</text>

<rect x="400" y="348" width="322" height="30" rx="6" fill="#f9fafb" stroke="#e5e7eb"/>
<rect x="408" y="354" width="18" height="18" rx="9" fill="#d1d5db"/>
<circle cx="414" cy="363" r="5" fill="#ffffff"/>
<text x="434" y="368" font-size="10" fill="#1f2937">Abandoned checkout</text>
<!-- Annotations -->
<g class="doc-annotations">
<circle cx="220" cy="290" r="10" fill="#ef4444"/><text x="220" y="294" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="232" y="218" width="144" height="144" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="10"/>
<circle cx="736" cy="326" r="10" fill="#ef4444"/><text x="736" y="330" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>
</g>
</svg>
