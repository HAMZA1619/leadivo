<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="340" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="355" r="4" fill="#10b981"/><text x="42" y="359" font-size="12" fill="#10b981" font-weight="600">Integrations</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Integration setup -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">Google Analytics</text>
<text x="210" y="94" font-size="11" fill="#6b7280">Add Google Analytics tracking to your storefront.</text>
<!-- Setup form -->
<rect x="210" y="114" width="480" height="220" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="146" font-size="12" font-weight="600" fill="#1f2937">Configuration</text>
<!-- GA ID field -->
<text x="234" y="176" font-size="11" fill="#374151">Measurement ID</text>
<rect x="234" y="184" width="432" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="248" y="206" font-size="11" fill="#9ca3af">e.g. G-XXXXXXXXXX</text>
<text x="234" y="234" font-size="10" fill="#6b7280">Find this in Google Analytics &gt; Admin &gt; Data Streams &gt; Web</text>
<!-- Status indicator -->
<rect x="234" y="256" width="432" height="38" rx="6" fill="#ecfdf5" stroke="#d1fae5"/>
<circle cx="256" cy="275" r="5" fill="#10b981"/><text x="272" y="279" font-size="10" fill="#059669" font-weight="500">Active — Tracking events on your storefront</text>
<!-- Save button -->
<rect x="580" y="306" width="86" height="32" rx="6" fill="#10b981"/><text x="623" y="326" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Save</text>
<!-- Info card -->
<rect x="210" y="360" width="480" height="60" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="386" font-size="11" fill="#374151" font-weight="500">How it works</text>
<text x="234" y="404" font-size="10" fill="#6b7280">The GA tracking script is automatically added to your storefront pages.</text>
<!-- Annotations -->
<circle cx="700" cy="200" r="10" fill="#ef4444"/><text x="700" y="204" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
</svg>
