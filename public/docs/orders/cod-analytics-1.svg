<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="52" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="67" r="4" fill="#10b981"/><text x="42" y="71" font-size="12" fill="#10b981" font-weight="600">Overview</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Title -->
<text x="210" y="74" font-size="18" font-weight="700" fill="#1f2937">COD Analytics</text>
<rect x="680" y="56" width="90" height="28" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="700" y="74" font-size="10" fill="#6b7280">Last 30 days</text>
<!-- KPI Cards row -->
<rect x="210" y="94" width="132" height="75" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="114" font-size="10" fill="#6b7280">Confirmation Rate</text>
<text x="226" y="138" font-size="22" font-weight="700" fill="#10b981">78%</text>
<text x="226" y="156" font-size="9" fill="#10b981">&#9650; +5%</text>

<rect x="352" y="94" width="132" height="75" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="368" y="114" font-size="10" fill="#6b7280">Delivery Rate</text>
<text x="368" y="138" font-size="22" font-weight="700" fill="#3b82f6">92%</text>
<text x="368" y="156" font-size="9" fill="#3b82f6">&#9650; +3%</text>

<rect x="494" y="94" width="132" height="75" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="510" y="114" font-size="10" fill="#6b7280">Return Rate</text>
<text x="510" y="138" font-size="22" font-weight="700" fill="#f59e0b">6%</text>
<text x="510" y="156" font-size="9" fill="#10b981">&#9660; -2%</text>

<rect x="636" y="94" width="132" height="75" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="652" y="114" font-size="10" fill="#6b7280">Revenue</text>
<text x="652" y="138" font-size="22" font-weight="700" fill="#1f2937">$4.2k</text>
<text x="652" y="156" font-size="9" fill="#10b981">&#9650; +18%</text>

<!-- Donut Charts row -->
<!-- Delivery Success Donut -->
<rect x="210" y="185" width="185" height="245" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="210" font-size="11" font-weight="500" fill="#6b7280">Delivery Success</text>
<!-- Donut ring -->
<circle cx="302" cy="290" r="50" fill="none" stroke="#e5e7eb" stroke-width="14"/>
<circle cx="302" cy="290" r="50" fill="none" stroke="#14b8a6" stroke-width="14" stroke-dasharray="260 54" stroke-dashoffset="0" transform="rotate(-90 302 290)"/>
<circle cx="302" cy="290" r="50" fill="none" stroke="#fb923c" stroke-width="14" stroke-dasharray="20 294" stroke-dashoffset="-260" transform="rotate(-90 302 290)"/>
<circle cx="302" cy="290" r="50" fill="none" stroke="#f43f5e" stroke-width="14" stroke-dasharray="34 280" stroke-dashoffset="-280" transform="rotate(-90 302 290)"/>
<text x="302" y="286" font-size="9" fill="#6b7280" text-anchor="middle">Delivery</text>
<text x="302" y="300" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">92%</text>
<!-- Legend -->
<circle cx="232" cy="360" r="4" fill="#14b8a6"/><text x="242" y="364" font-size="9" fill="#6b7280">Delivered 103</text>
<circle cx="232" cy="378" r="4" fill="#fb923c"/><text x="242" y="382" font-size="9" fill="#6b7280">Returned 9</text>
<circle cx="232" cy="396" r="4" fill="#f43f5e"/><text x="242" y="400" font-size="9" fill="#6b7280">Canceled 12</text>

<!-- Revenue by Status Donut -->
<rect x="405" y="185" width="185" height="245" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="421" y="210" font-size="11" font-weight="500" fill="#6b7280">Revenue by Status</text>
<circle cx="497" cy="290" r="50" fill="none" stroke="#e5e7eb" stroke-width="14"/>
<circle cx="497" cy="290" r="50" fill="none" stroke="#059669" stroke-width="14" stroke-dasharray="200 114" stroke-dashoffset="0" transform="rotate(-90 497 290)"/>
<circle cx="497" cy="290" r="50" fill="none" stroke="#7c3aed" stroke-width="14" stroke-dasharray="50 264" stroke-dashoffset="-200" transform="rotate(-90 497 290)"/>
<circle cx="497" cy="290" r="50" fill="none" stroke="#d97706" stroke-width="14" stroke-dasharray="40 274" stroke-dashoffset="-250" transform="rotate(-90 497 290)"/>
<circle cx="497" cy="290" r="50" fill="none" stroke="#dc2626" stroke-width="14" stroke-dasharray="24 290" stroke-dashoffset="-290" transform="rotate(-90 497 290)"/>
<text x="497" y="286" font-size="9" fill="#6b7280" text-anchor="middle">Sales</text>
<text x="497" y="300" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">$4.2k</text>
<circle cx="427" cy="360" r="4" fill="#059669"/><text x="437" y="364" font-size="9" fill="#6b7280">Collected $3.8k</text>
<circle cx="427" cy="378" r="4" fill="#7c3aed"/><text x="437" y="382" font-size="9" fill="#6b7280">In Transit $620</text>
<circle cx="427" cy="396" r="4" fill="#d97706"/><text x="437" y="400" font-size="9" fill="#6b7280">Pending $890</text>

<!-- Status Distribution Donut -->
<rect x="600" y="185" width="170" height="245" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="616" y="210" font-size="11" font-weight="500" fill="#6b7280">Status Distribution</text>
<circle cx="685" cy="290" r="50" fill="none" stroke="#e5e7eb" stroke-width="14"/>
<circle cx="685" cy="290" r="50" fill="none" stroke="#34d399" stroke-width="14" stroke-dasharray="200 114" stroke-dashoffset="0" transform="rotate(-90 685 290)"/>
<circle cx="685" cy="290" r="50" fill="none" stroke="#a78bfa" stroke-width="14" stroke-dasharray="40 274" stroke-dashoffset="-200" transform="rotate(-90 685 290)"/>
<circle cx="685" cy="290" r="50" fill="none" stroke="#38bdf8" stroke-width="14" stroke-dasharray="30 284" stroke-dashoffset="-240" transform="rotate(-90 685 290)"/>
<circle cx="685" cy="290" r="50" fill="none" stroke="#fbbf24" stroke-width="14" stroke-dasharray="20 294" stroke-dashoffset="-270" transform="rotate(-90 685 290)"/>
<text x="685" y="286" font-size="9" fill="#6b7280" text-anchor="middle">Orders</text>
<text x="685" y="300" font-size="14" font-weight="700" fill="#1f2937" text-anchor="middle">156</text>
<circle cx="620" cy="360" r="4" fill="#34d399"/><text x="630" y="364" font-size="9" fill="#6b7280">Delivered 103</text>
<circle cx="620" cy="378" r="4" fill="#a78bfa"/><text x="630" y="382" font-size="9" fill="#6b7280">Shipped 12</text>
<circle cx="620" cy="396" r="4" fill="#38bdf8"/><text x="630" y="400" font-size="9" fill="#6b7280">Confirmed 19</text>
</svg>
