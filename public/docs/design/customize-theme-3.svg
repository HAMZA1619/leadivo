<rect x="642" y="228" width="56" height="16" rx="4" fill="#10b981"/>
<rect x="704" y="228" width="56" height="16" rx="4" fill="#10b981"/>
<text x="670" y="239" font-size="5" fill="#ffffff" text-anchor="middle">Add to cart</text>
<text x="732" y="239" font-size="5" fill="#ffffff" text-anchor="middle">Add to cart</text>
<!-- Annotations -->
<g class="doc-annotations">
<circle cx="780" cy="70" r="10" fill="#ef4444"/><text x="780" y="74" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="698" y="54" width="74" height="32" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
</g>
</svg>
