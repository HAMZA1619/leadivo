<rect x="416" y="368" width="54" height="26" rx="4" fill="#10b981" stroke="#10b981"/><text x="443" y="385" font-size="9" fill="#ffffff" text-anchor="middle">Normal</text>
<rect x="478" y="368" width="58" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="507" y="385" font-size="9" fill="#6b7280" text-anchor="middle">Spacious</text>
<!-- Phone preview -->
<rect x="630" y="90" width="140" height="270" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
<rect x="675" y="96" width="50" height="10" rx="5" fill="#e5e7eb"/>
<rect x="636" y="112" width="128" height="28" rx="0" fill="#10b981" opacity="0.15"/>
<text x="700" y="130" font-size="7" font-weight="600" fill="#059669" text-anchor="middle">My Store</text>
<rect x="642" y="148" width="56" height="56" rx="8" fill="#f4f5f7"/>
<rect x="704" y="148" width="56" height="56" rx="8" fill="#f4f5f7"/>
