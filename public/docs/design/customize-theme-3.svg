<rect x="350" y="142" width="42" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="371" y="159" font-size="9" fill="#6b7280" text-anchor="middle">none</text>
<rect x="398" y="142" width="32" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="414" y="159" font-size="9" fill="#6b7280" text-anchor="middle">sm</text>
<rect x="436" y="142" width="32" height="26" rx="4" fill="#10b981" stroke="#10b981"/><text x="452" y="159" font-size="9" fill="#ffffff" text-anchor="middle">md</text>
<rect x="474" y="142" width="30" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="489" y="159" font-size="9" fill="#6b7280" text-anchor="middle">lg</text>
<rect x="510" y="142" width="30" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="525" y="159" font-size="9" fill="#6b7280" text-anchor="middle">xl</text>
