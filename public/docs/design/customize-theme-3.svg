<rect x="350" y="198" width="52" height="26" rx="4" fill="#10b981" stroke="#10b981"/><text x="376" y="215" font-size="9" fill="#ffffff" text-anchor="middle">Filled</text>
<rect x="410" y="198" width="56" height="26" rx="4" fill="#ffffff" stroke="#d1d5db"/><text x="438" y="215" font-size="9" fill="#6b7280" text-anchor="middle">Outline</text>
