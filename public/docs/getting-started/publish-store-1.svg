<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<rect x="8" y="88" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="103" r="4" fill="#10b981"/><text x="42" y="107" font-size="12" fill="#10b981" font-weight="600">Store</text>
<circle cx="28" cy="139" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="143" font-size="12" fill="#6b7280">Design</text>
<circle cx="28" cy="175" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="179" font-size="12" fill="#6b7280">Products</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Page title with status dropdown -->
<text x="210" y="78" font-size="20" font-weight="700" fill="#1f2937">Store</text>
<!-- Status dropdown - Published -->
<rect x="270" y="60" width="86" height="24" rx="12" fill="#d1fae5" stroke="#10b981"/>
<circle cx="282" cy="72" r="3" fill="#10b981"/>
<text x="290" y="76" font-size="10" fill="#059669" font-weight="500">Published</text>
<text x="348" y="76" font-size="8" fill="#059669">▾</text>
<!-- Dropdown open -->
<rect x="270" y="88" width="86" height="56" rx="8" fill="#ffffff" stroke="#e5e7eb" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.07))"/>
<rect x="274" y="92" width="78" height="24" rx="4" fill="#ecfdf5"/>
<circle cx="286" cy="104" r="3" fill="#10b981"/><text x="294" y="108" font-size="10" fill="#059669" font-weight="500">Published</text>
<circle cx="286" cy="128" r="3" fill="#ef4444"/><text x="294" y="132" font-size="10" fill="#6b7280">Draft</text>
<!-- Form fields -->
<text x="210" y="170" font-size="11" font-weight="500" fill="#1f2937">Store name</text>
<rect x="210" y="178" width="560" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="200" font-size="11" fill="#1f2937">My Store</text>
<text x="210" y="232" font-size="11" font-weight="500" fill="#1f2937">Store URL</text>
<rect x="210" y="240" width="560" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="262" font-size="11" fill="#6b7280">leadivo.app/</text><text x="302" y="262" font-size="11" fill="#1f2937">my-store</text>
<text x="210" y="294" font-size="11" font-weight="500" fill="#1f2937">Currency</text>
<rect x="210" y="302" width="560" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="324" font-size="11" fill="#1f2937">USD — US Dollar</text>
<!-- Annotation -->
<g class="doc-annotations">
<circle cx="400" cy="72" r="10" fill="#ef4444"/><text x="400" y="76" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="268" y="58" width="90" height="28" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="14"/>
<rect x="418" y="63" width="170" height="17" rx="4" fill="#ef4444"/><text x="423" y="75" font-size="9" fill="#fff" font-weight="600">Change to Published</text>
</g>
</svg>
