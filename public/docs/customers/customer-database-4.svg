<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Main content area -->
<rect x="100" y="40" width="600" height="370" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<!-- Title -->
<text x="210" y="78" font-size="20" font-weight="700" fill="#1f2937">Customers</text>
<!-- Search and export bar -->
<rect x="130" y="92" width="340" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/><text x="142" y="112" font-size="11" fill="#9ca3af">Search by name, phone or email</text>
<rect x="480" y="92" width="100" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/><text x="496" y="112" font-size="11" fill="#6b7280">All countries</text>
<rect x="590" y="92" width="90" height="32" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/><text x="610" y="112" font-size="11" fill="#6b7280">Export CSV</text>

<!-- Export confirmation dialog overlay -->
<rect x="0" y="0" width="800" height="450" fill="#000000" opacity="0.3" rx="8"/>
<rect x="220" y="130" width="360" height="190" rx="12" fill="#ffffff"/>
<text x="250" y="168" font-size="16" font-weight="600" fill="#1f2937">Export customers?</text>
<text x="250" y="195" font-size="12" fill="#6b7280">This will download a CSV file with your</text>
<text x="250" y="212" font-size="12" fill="#6b7280">customer data.</text>
<!-- Buttons -->
<rect x="370" y="250" width="80" height="34" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/><text x="393" y="271" font-size="12" fill="#6b7280">Cancel</text>
<rect x="460" y="250" width="90" height="34" rx="6" fill="#1f2937"/><text x="486" y="271" font-size="12" fill="#ffffff" font-weight="500">Export</text>

<!-- Annotations -->
<g class="doc-annotations">
<circle cx="505" cy="267" r="20" fill="#ef4444" opacity="0.10"/><circle cx="505" cy="267" r="20" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/><g transform="translate(511, 269)"><path d="M0,0 L0,14 L4,10 L7,16 L9,15 L6,9 L11,9 Z" fill="#ef4444" stroke="#fff" stroke-width="0.7"/></g><rect x="533" y="258" width="37.5" height="17" rx="4" fill="#ef4444"/><text x="538" y="270" font-size="9" fill="#fff" font-weight="600">Click</text>
</g>
</svg>
