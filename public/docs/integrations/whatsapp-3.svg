<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="376" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="391" r="4" fill="#10b981"/><text x="42" y="395" font-size="12" fill="#10b981" font-weight="600">Integrations</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- WhatsApp setup page - Connected -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">WhatsApp</text>
<text x="210" y="94" font-size="11" fill="#6b7280">Send order confirmations to customers via WhatsApp when orders are placed.</text>
<!-- Connection section -->
<rect x="210" y="114" width="560" height="220" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="144" font-size="13" font-weight="600" fill="#1f2937">Connection</text>
<!-- Connected state -->
<rect x="234" y="158" width="512" height="48" rx="8" fill="#dcfce7" stroke="#bbf7d0"/>
<circle cx="254" cy="182" r="6" fill="#16a34a"/>
<text x="268" y="178" font-size="11" fill="#166534" font-weight="500">Connected</text>
<text x="268" y="194" font-size="10" fill="#166534">WhatsApp is connected and receiving notifications.</text>
<rect x="650" y="168" width="80" height="28" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="690" y="186" font-size="10" fill="#dc2626" text-anchor="middle">Disconnect</text>
<!-- Language selection -->
<text x="234" y="232" font-size="11" font-weight="500" fill="#1f2937">Message Language</text>
<rect x="234" y="240" width="200" height="32" rx="6" fill="#ffffff" stroke="#d1d5db"/>
<text x="248" y="260" font-size="10" fill="#1f2937">English</text>
<text x="420" y="260" font-size="10" fill="#6b7280">▾</text>
<!-- Events enabled -->
<text x="234" y="290" font-size="11" font-weight="500" fill="#1f2937">Active Events</text>
<rect x="234" y="300" width="100" height="22" rx="11" fill="#dcfce7"/><text x="246" y="315" font-size="9" fill="#16a34a">New order</text>
<rect x="342" y="300" width="130" height="22" rx="11" fill="#dcfce7"/><text x="354" y="315" font-size="9" fill="#16a34a">Abandoned checkout</text>
<!-- WhatsApp message preview -->
<rect x="210" y="350" width="560" height="80" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="378" font-size="12" font-weight="600" fill="#1f2937">Message Preview</text>
<rect x="234" y="388" width="340" height="30" rx="8" fill="#dcfce7"/>
<text x="248" y="407" font-size="9" fill="#166534">New order #1042 from Ahmed K. — $89.00 — 2 items</text>
<!-- Annotations -->
<g class="doc-annotations">
<circle cx="220" cy="182" r="10" fill="#ef4444"/><text x="220" y="186" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="232" y="156" width="516" height="52" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="10"/>
</g>
</svg>
