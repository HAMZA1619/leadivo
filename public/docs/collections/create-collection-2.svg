<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Dimmed background -->
<rect width="800" height="450" fill="#000000" opacity="0.3" rx="8"/>
<!-- Dialog -->
<rect x="175" y="40" width="450" height="370" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<!-- Dialog header -->
<text x="200" y="72" font-size="16" font-weight="700" fill="#1f2937">Create Collection</text>
<text x="598" y="72" font-size="16" fill="#9ca3af">×</text>
<!-- Name field -->
<text x="200" y="104" font-size="11" font-weight="500" fill="#1f2937">Collection name</text>
<rect x="200" y="112" width="400" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="214" y="134" font-size="11" fill="#1f2937">Summer Collection</text>
<!-- Product selector -->
<text x="200" y="168" font-size="11" font-weight="500" fill="#1f2937">Products</text>
<!-- Selected product badges -->
<rect x="200" y="178" width="110" height="24" rx="12" fill="#f4f5f7" stroke="#e5e7eb"/>
<text x="212" y="194" font-size="10" fill="#1f2937">Classic T-Shirt</text><text x="300" y="194" font-size="10" fill="#9ca3af">×</text>
<rect x="318" y="178" width="105" height="24" rx="12" fill="#f4f5f7" stroke="#e5e7eb"/>
<text x="330" y="194" font-size="10" fill="#1f2937">Leather Wallet</text><text x="413" y="194" font-size="10" fill="#9ca3af">×</text>
<!-- Product dropdown (open) -->
<rect x="200" y="210" width="400" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/>
<text x="214" y="232" font-size="11" fill="#9ca3af">Search products...</text>
<text x="582" y="232" font-size="10" fill="#6b7280">▾</text>
<!-- Dropdown items -->
<rect x="200" y="248" width="400" height="130" rx="8" fill="#ffffff" stroke="#e5e7eb" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.07))"/>
<!-- Product 1 - checked -->
<rect x="212" y="258" width="14" height="14" rx="3" fill="#10b981" stroke="#10b981"/>
<text x="221" y="268" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">✓</text>
<text x="236" y="269" font-size="11" fill="#1f2937">Classic T-Shirt</text>
<!-- Product 2 - checked -->
<rect x="212" y="284" width="14" height="14" rx="3" fill="#10b981" stroke="#10b981"/>
<text x="221" y="294" font-size="8" fill="#fff" text-anchor="middle" font-weight="700">✓</text>
<text x="236" y="295" font-size="11" fill="#1f2937">Leather Wallet</text>
<!-- Product 3 - unchecked -->
<rect x="212" y="310" width="14" height="14" rx="3" fill="#ffffff" stroke="#d1d5db"/>
<text x="236" y="321" font-size="11" fill="#1f2937">Summer Hat</text>
<!-- Product 4 - unchecked -->
<rect x="212" y="336" width="14" height="14" rx="3" fill="#ffffff" stroke="#d1d5db"/>
<text x="236" y="347" font-size="11" fill="#1f2937">Headphones Pro</text>
<!-- Action buttons -->
<rect x="460" y="390" width="60" height="32" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="490" y="410" font-size="10" fill="#6b7280" text-anchor="middle">Cancel</text>
<rect x="528" y="390" width="72" height="32" rx="6" fill="#10b981"/><text x="564" y="410" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="500">Create</text>
<!-- Annotations -->
<g class="doc-annotations">
<rect x="198" y="110" width="404" height="40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="187" cy="130" r="10" fill="#ef4444"/><text x="187" y="134" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="198" y="246" width="404" height="134" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="187" cy="313" r="10" fill="#ef4444"/><text x="187" y="317" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>
</g>
</svg>
