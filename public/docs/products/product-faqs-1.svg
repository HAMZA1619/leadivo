<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<circle cx="28" cy="103" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="107" font-size="12" fill="#6b7280">Store</text>
<rect x="8" y="124" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="139" r="4" fill="#10b981"/><text x="42" y="143" font-size="12" fill="#10b981" font-weight="600">Products</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<text x="210" y="28" font-size="18" font-weight="700" fill="#1f2937">Edit Product</text>
<!-- Product form content -->
<rect x="210" y="60" width="560" height="380" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<!-- Product FAQs section -->
<text x="230" y="90" font-size="13" font-weight="600" fill="#1f2937">Product FAQs</text>
<text x="650" y="90" font-size="11" fill="#10b981" font-weight="500">+ Add FAQ</text>
<text x="230" y="112" font-size="10" fill="#9ca3af">Add frequently asked questions to help customers and improve SEO.</text>
<!-- FAQ item 1 -->
<rect x="230" y="128" width="520" height="120" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="245" y="150" font-size="10" fill="#6b7280">Question</text>
<rect x="245" y="156" width="470" height="28" rx="5" fill="#ffffff" stroke="#d1d5db"/><text x="253" y="174" font-size="11" fill="#1f2937">What is the return policy?</text>
<text x="245" y="202" font-size="10" fill="#6b7280">Answer</text>
<rect x="245" y="208" width="470" height="28" rx="5" fill="#ffffff" stroke="#d1d5db"/><text x="253" y="226" font-size="11" fill="#1f2937">You can return within 14 days of delivery.</text>
<rect x="725" y="140" width="20" height="20" rx="4" fill="#f4f5f7"/><text x="735" y="154" font-size="11" fill="#9ca3af" text-anchor="middle">×</text>
<!-- FAQ item 2 -->
<rect x="230" y="260" width="520" height="120" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="245" y="282" font-size="10" fill="#6b7280">Question</text>
<rect x="245" y="288" width="470" height="28" rx="5" fill="#ffffff" stroke="#d1d5db"/><text x="253" y="306" font-size="11" fill="#1f2937">How long does shipping take?</text>
<text x="245" y="334" font-size="10" fill="#6b7280">Answer</text>
<rect x="245" y="340" width="470" height="28" rx="5" fill="#ffffff" stroke="#d1d5db"/><text x="253" y="358" font-size="11" fill="#1f2937">Delivery takes 3-5 business days.</text>
<rect x="725" y="272" width="20" height="20" rx="4" fill="#f4f5f7"/><text x="735" y="286" font-size="11" fill="#9ca3af" text-anchor="middle">×</text>
<!-- Annotations -->
<circle cx="755" cy="90" r="10" fill="#ef4444"/><text x="755" y="94" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<circle cx="650" cy="86" r="16" fill="#ef4444" opacity="0.10"/><circle cx="650" cy="86" r="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
</svg>
