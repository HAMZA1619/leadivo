<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Storefront product page mockup -->
<rect x="150" y="20" width="500" height="410" rx="12" fill="#ffffff" stroke="#e5e7eb"/>
<!-- Store header -->
<rect x="150" y="20" width="500" height="40" rx="12" fill="#ffffff"/><line x1="150" y1="60" x2="650" y2="60" stroke="#e5e7eb"/>
<circle cx="180" cy="40" r="10" fill="#10b981" opacity="0.2"/><text x="200" y="44" font-size="11" fill="#10b981" font-weight="600">My Store</text>
<!-- Product info -->
<text x="180" y="90" font-size="16" font-weight="700" fill="#1f2937">Classic T-Shirt</text>
<text x="180" y="110" font-size="14" font-weight="700" fill="#10b981">$29.99</text>
<text x="240" y="110" font-size="12" fill="#9ca3af" text-decoration="line-through">$39.99</text>
<text x="180" y="132" font-size="10" fill="#6b7280">Comfortable cotton t-shirt perfect for everyday wear.</text>
<!-- Add to cart button -->
<rect x="180" y="148" width="440" height="34" rx="8" fill="#10b981"/><text x="400" y="169" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="500">Add to cart</text>
<!-- FAQ section separator -->
<line x1="180" y1="200" x2="620" y2="200" stroke="#e5e7eb"/>
<text x="180" y="228" font-size="14" font-weight="700" fill="#1f2937">Frequently Asked Questions</text>
<!-- FAQ accordion items -->
<rect x="180" y="244" width="440" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="196" y="269" font-size="11" fill="#1f2937" font-weight="500">What is the return policy?</text>
<text x="600" y="269" font-size="12" fill="#9ca3af">&#8964;</text>
<rect x="180" y="294" width="440" height="70" rx="8" fill="#f9fafb" stroke="#e5e7eb"/>
<text x="196" y="316" font-size="11" fill="#1f2937" font-weight="500">How long does shipping take?</text>
<text x="600" y="316" font-size="12" fill="#10b981">&#8963;</text>
<text x="196" y="340" font-size="10" fill="#6b7280">Delivery takes 3-5 business days within your region.</text>
<text x="196" y="354" font-size="10" fill="#6b7280">International orders may take 7-14 days.</text>
<rect x="180" y="372" width="440" height="42" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="196" y="397" font-size="11" fill="#1f2937" font-weight="500">What sizes are available?</text>
<text x="600" y="397" font-size="12" fill="#9ca3af">&#8964;</text>
<!-- Annotations -->
<circle cx="140" cy="228" r="10" fill="#ef4444"/><text x="140" y="232" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="100" y="240" width="60" height="17" rx="4" fill="#ef4444"/><text x="105" y="252" font-size="9" fill="#fff" font-weight="600">FAQ</text>
</svg>
