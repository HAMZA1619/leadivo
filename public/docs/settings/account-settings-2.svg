<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<circle cx="28" cy="103" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="107" font-size="12" fill="#6b7280">Store</text>
<circle cx="28" cy="175" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="179" font-size="12" fill="#6b7280">Products</text>
<circle cx="28" cy="247" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="251" font-size="12" fill="#6b7280">Orders</text>
<rect x="8" y="376" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="391" r="4" fill="#10b981"/><text x="42" y="395" font-size="12" fill="#10b981" font-weight="600">Settings</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<text x="200" y="27" font-size="11" fill="#10b981">View store ↗</text>
<!-- Page title -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">Account Settings</text>
<!-- Profile section -->
<text x="210" y="100" font-size="11" font-weight="500" fill="#6b7280">Profile</text>
<rect x="210" y="110" width="560" height="66" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="136" font-size="10" fill="#6b7280">Name</text>
<text x="754" y="136" font-size="11" fill="#1f2937" text-anchor="end">John Doe</text>
<line x1="226" y1="146" x2="754" y2="146" stroke="#f0f0f0"/>
<text x="226" y="166" font-size="10" fill="#6b7280">Email</text>
<text x="754" y="166" font-size="11" fill="#1f2937" text-anchor="end">you@example.com</text>
<!-- Billing section - Active -->
<text x="210" y="200" font-size="11" font-weight="500" fill="#6b7280">Billing</text>
<rect x="210" y="210" width="560" height="66" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="236" font-size="10" fill="#6b7280">Status</text>
<rect x="706" y="224" width="48" height="18" rx="9" fill="#dcfce7"/><text x="730" y="237" font-size="9" fill="#059669" text-anchor="middle">Active</text>
<line x1="226" y1="248" x2="754" y2="248" stroke="#f0f0f0"/>
<text x="226" y="268" font-size="10" fill="#6b7280">Plan</text>
<text x="754" y="268" font-size="11" fill="#1f2937" font-weight="600" text-anchor="end">Pro</text>
<!-- Cancel subscription button -->
<rect x="210" y="286" width="130" height="28" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="275" y="304" font-size="10" fill="#dc2626" text-anchor="middle">Cancel subscription</text>
<!-- Invoices section -->
<text x="210" y="338" font-size="11" font-weight="500" fill="#6b7280">Invoices</text>
<rect x="210" y="348" width="560" height="30" fill="#f4f5f7" rx="0"/>
<text x="226" y="367" font-size="10" font-weight="500" fill="#6b7280">Date</text>
<text x="440" y="367" font-size="10" font-weight="500" fill="#6b7280">Amount</text>
<text x="600" y="367" font-size="10" font-weight="500" fill="#6b7280">Status</text>
<text x="720" y="367" font-size="10" font-weight="500" fill="#6b7280">Invoice</text>
<!-- Invoice rows -->
<text x="226" y="397" font-size="10" fill="#1f2937">Mar 1, 2026</text>
<text x="440" y="397" font-size="10" fill="#1f2937">$19.00</text>
<rect x="598" y="385" width="36" height="18" rx="9" fill="#dcfce7"/><text x="616" y="398" font-size="8" fill="#059669" text-anchor="middle">Paid</text>
<text x="720" y="397" font-size="10" fill="#3b82f6">View ↗</text>
<line x1="210" y1="408" x2="770" y2="408" stroke="#f0f0f0"/>
<text x="226" y="427" font-size="10" fill="#1f2937">Feb 1, 2026</text>
<text x="440" y="427" font-size="10" fill="#1f2937">$19.00</text>
<rect x="598" y="415" width="36" height="18" rx="9" fill="#dcfce7"/><text x="616" y="428" font-size="8" fill="#059669" text-anchor="middle">Paid</text>
<text x="720" y="427" font-size="10" fill="#3b82f6">View ↗</text>
<!-- Annotations -->
<g class="doc-annotations">
<rect x="208" y="108" width="564" height="70" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="197" cy="143" r="10" fill="#ef4444"/><text x="197" y="147" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="208" y="208" width="564" height="70" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="197" cy="243" r="10" fill="#ef4444"/><text x="197" y="247" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>
</g>
</svg>
