<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  </style>
</defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Focused card: Tags editor -->
<rect x="120" y="30" width="560" height="180" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="145" y="60" font-size="13" font-weight="600" fill="#1f2937">Tags</text>
<!-- Existing tags as pills -->
<rect x="145" y="74" width="42" height="24" rx="12" fill="#ecfdf5"/><text x="155" y="90" font-size="10" fill="#059669" font-weight="500">VIP</text><text x="178" y="90" font-size="9" fill="#6b7280">×</text>
<rect x="197" y="74" width="50" height="24" rx="12" fill="#ecfdf5"/><text x="207" y="90" font-size="10" fill="#059669" font-weight="500">Loyal</text><text x="238" y="90" font-size="9" fill="#6b7280">×</text>
<rect x="257" y="74" width="76" height="24" rx="12" fill="#ecfdf5"/><text x="267" y="90" font-size="10" fill="#059669" font-weight="500">Wholesale</text><text x="324" y="90" font-size="9" fill="#6b7280">×</text>
<!-- Input field -->
<rect x="145" y="108" width="510" height="30" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/><text x="157" y="127" font-size="11" fill="#9ca3af">Add a tag...</text>
<!-- Autocomplete dropdown -->
<rect x="145" y="140" width="200" height="58" rx="6" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
<text x="165" y="162" font-size="10" fill="#6b7280">+ New</text>
<rect x="147" y="170" width="196" height="24" rx="4" fill="#f4f5f7"/><text x="165" y="186" font-size="10" fill="#1f2937">+ Returns Often</text>

<!-- Focused card: Notes editor -->
<rect x="120" y="240" width="560" height="170" rx="10" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
<text x="145" y="270" font-size="13" font-weight="600" fill="#1f2937">Notes</text>
<rect x="145" y="284" width="510" height="80" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1"/>
<text x="157" y="304" font-size="11" fill="#1f2937">Repeat buyer, prefers COD. Always orders</text>
<text x="157" y="320" font-size="11" fill="#1f2937">on weekends. Referred 3 friends.</text>
<text x="157" y="336" font-size="11" fill="#1f2937">Contact before shipping — specific delivery</text>
<text x="157" y="352" font-size="11" fill="#1f2937">window required (evenings only).</text>
<!-- Saved indicator -->
<text x="145" y="385" font-size="10" fill="#6b7280">✓ Saved</text>

<!-- Annotations -->
<g class="doc-annotations">
<circle cx="300" cy="90" r="22" fill="#ef4444" opacity="0.10"/><circle cx="300" cy="90" r="22" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/><g transform="translate(306, 92)"><path d="M0,0 L0,14 L4,10 L7,16 L9,15 L6,9 L11,9 Z" fill="#ef4444" stroke="#fff" stroke-width="0.7"/></g><rect x="328" y="81" width="35" height="17" rx="4" fill="#ef4444"/><text x="333" y="93" font-size="9" fill="#fff" font-weight="600">Tags</text>

<circle cx="400" cy="320" r="22" fill="#ef4444" opacity="0.10"/><circle cx="400" cy="320" r="22" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/><g transform="translate(406, 322)"><path d="M0,0 L0,14 L4,10 L7,16 L9,15 L6,9 L11,9 Z" fill="#ef4444" stroke="#fff" stroke-width="0.7"/></g><rect x="428" y="311" width="42" height="17" rx="4" fill="#ef4444"/><text x="433" y="323" font-size="9" fill="#fff" font-weight="600">Notes</text>
</g>
</svg>
