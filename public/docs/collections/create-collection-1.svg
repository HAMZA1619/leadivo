<text x="226" y="211" font-size="11" fill="#1f2937">Sale</text>
<text x="540" y="211" font-size="11" fill="#6b7280">8</text>
<text x="720" y="211" font-size="11" fill="#6b7280" text-anchor="end">⋯</text>
<line x1="210" y1="221" x2="770" y2="221" stroke="#f0f0f0"/>
<!-- Empty state hint -->
<text x="490" y="280" font-size="11" fill="#9ca3af" text-anchor="middle">Click "Create Collection" to add a new collection</text>
