<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<rect x="8" y="88" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="103" r="4" fill="#10b981"/><text x="42" y="107" font-size="12" fill="#10b981" font-weight="600">Store</text>
<circle cx="28" cy="139" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="143" font-size="12" fill="#6b7280">Design</text>
<circle cx="28" cy="175" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="179" font-size="12" fill="#6b7280">Products</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Page title -->
<text x="210" y="78" font-size="20" font-weight="700" fill="#1f2937">Store</text>
<rect x="270" y="60" width="86" height="24" rx="12" fill="#d1fae5" stroke="#10b981"/><circle cx="282" cy="72" r="3" fill="#10b981"/><text x="290" y="76" font-size="10" fill="#059669" font-weight="500">Published</text><text x="348" y="76" font-size="8" fill="#059669">▾</text>
<!-- Update button -->
<rect x="680" y="58" width="90" height="28" rx="6" fill="#10b981"/><text x="725" y="76" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="500">Update Store</text>
<!-- Store name -->
<text x="210" y="110" font-size="11" font-weight="500" fill="#1f2937">Store name</text>
<rect x="210" y="118" width="560" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="140" font-size="11" fill="#1f2937">My Store</text>
<!-- Store URL -->
<text x="210" y="172" font-size="11" font-weight="500" fill="#1f2937">Store URL</text>
<rect x="210" y="180" width="560" height="36" rx="6" fill="#f9fafb" stroke="#d1d5db"/><text x="224" y="202" font-size="11" fill="#6b7280">leadivo.app/</text><text x="302" y="202" font-size="11" fill="#1f2937">my-store</text>
<!-- Currency -->
<text x="210" y="234" font-size="11" font-weight="500" fill="#1f2937">Currency</text>
<rect x="210" y="242" width="560" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="264" font-size="11" fill="#1f2937">USD — US Dollar</text><text x="754" y="264" font-size="10" fill="#6b7280">▾</text>
<!-- Custom Domain section below -->
<line x1="210" y1="300" x2="770" y2="300" stroke="#e5e7eb"/>
<text x="210" y="326" font-size="13" font-weight="600" fill="#1f2937">Custom Domain</text>
<text x="210" y="344" font-size="10" fill="#6b7280">Connect your own domain to this store.</text>
<rect x="210" y="356" width="420" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="378" font-size="11" fill="#9ca3af">shop.yourbrand.com</text>
<rect x="640" y="356" width="130" height="36" rx="6" fill="#10b981"/><text x="705" y="378" font-size="10" fill="#ffffff" text-anchor="middle" font-weight="500">Save Domain</text>
<!-- Annotations -->
<g class="doc-annotations">
<rect x="208" y="116" width="564" height="40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="197" cy="136" r="10" fill="#ef4444"/><text x="197" y="140" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="208" y="178" width="564" height="40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="197" cy="198" r="10" fill="#ef4444"/><text x="197" y="202" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>
<rect x="208" y="240" width="564" height="40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
<circle cx="197" cy="260" r="10" fill="#ef4444"/><text x="197" y="264" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">3</text>
</g>
</svg>
