<text x="720" y="113" font-size="10" font-weight="500" fill="#6b7280" text-anchor="end">Actions</text>
<!-- Row 1 -->
<text x="226" y="147" font-size="11" fill="#1f2937">Best Sellers</text>
<text x="540" y="147" font-size="11" fill="#6b7280">12</text>
<text x="720" y="147" font-size="11" fill="#6b7280" text-anchor="end">⋯</text>
<line x1="210" y1="157" x2="770" y2="157" stroke="#f0f0f0"/>
