<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="340" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="355" r="4" fill="#10b981"/><text x="42" y="359" font-size="12" fill="#10b981" font-weight="600">Integrations</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Integration setup -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">TikTok Events API</text>
<text x="210" y="94" font-size="11" fill="#6b7280">Track conversions from your TikTok ads.</text>
<!-- Setup form -->
<rect x="210" y="114" width="480" height="300" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<text x="234" y="146" font-size="12" font-weight="600" fill="#1f2937">Configuration</text>
<!-- Pixel Code field -->
<text x="234" y="176" font-size="11" fill="#374151">Pixel Code</text>
<rect x="234" y="184" width="432" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="248" y="206" font-size="11" fill="#9ca3af">e.g. CXXXXXXXXXXXXXXXXX</text>
<!-- Access Token field -->
<text x="234" y="240" font-size="11" fill="#374151">Access Token</text>
<rect x="234" y="248" width="432" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="248" y="270" font-size="11" fill="#9ca3af">Your TikTok access token</text>
<!-- Test Event Code -->
<text x="234" y="304" font-size="11" fill="#374151">Test Event Code (optional)</text>
<rect x="234" y="312" width="432" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="248" y="334" font-size="11" fill="#9ca3af">For testing in TikTok Events Manager</text>
<!-- Events tracked -->
<text x="234" y="375" font-size="10" fill="#6b7280">Events tracked: ViewContent, AddToCart, InitiateCheckout, Purchase</text>
<!-- Save button -->
<rect x="580" y="386" width="86" height="32" rx="6" fill="#10b981"/><text x="623" y="406" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Save</text>
<!-- Annotations -->
<circle cx="700" cy="200" r="10" fill="#ef4444"/><text x="700" y="204" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<circle cx="700" cy="266" r="10" fill="#ef4444"/><text x="700" y="270" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">2</text>
</svg>
