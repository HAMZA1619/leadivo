<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Import dialog - preview step -->
<rect x="100" y="20" width="600" height="410" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
<!-- Dialog header -->
<text x="130" y="52" font-size="14" font-weight="700" fill="#1f2937">Import products from CSV</text>
<text x="670" y="52" font-size="14" fill="#9ca3af">&#10005;</text>
<!-- File info -->
<rect x="130" y="66" width="150" height="22" rx="11" fill="#f4f5f7"/><text x="142" y="81" font-size="10" fill="#6b7280">products.csv</text>
<text x="290" y="81" font-size="10" fill="#9ca3af">5 rows &#183; 3 products</text>
<!-- Product preview cards -->
<rect x="130" y="100" width="540" height="62" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="145" y="112" width="32" height="32" rx="6" fill="#f4f5f7"/><text x="161" y="133" font-size="12" fill="#9ca3af" text-anchor="middle" font-weight="700">1</text>
<text x="190" y="126" font-size="12" fill="#1f2937" font-weight="500">Classic T-Shirt</text>
<rect x="316" y="117" width="42" height="18" rx="9" fill="#ecfdf5"/><text x="323" y="130" font-size="9" fill="#10b981" font-weight="500">active</text>
<text x="190" y="146" font-size="10" fill="#9ca3af">$29.99</text>
<text x="244" y="146" font-size="10" fill="#9ca3af" text-decoration="line-through">$39.99</text>
<text x="300" y="146" font-size="10" fill="#9ca3af">SKU: TSH-001</text>
<text x="400" y="146" font-size="10" fill="#10b981">3 variants</text>

<rect x="130" y="170" width="540" height="62" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="145" y="182" width="32" height="32" rx="6" fill="#f4f5f7"/><text x="161" y="203" font-size="12" fill="#9ca3af" text-anchor="middle" font-weight="700">2</text>
<text x="190" y="196" font-size="12" fill="#1f2937" font-weight="500">Leather Wallet</text>
<rect x="302" y="187" width="42" height="18" rx="9" fill="#ecfdf5"/><text x="309" y="200" font-size="9" fill="#10b981" font-weight="500">active</text>
<text x="190" y="216" font-size="10" fill="#9ca3af">$49.99</text>
<text x="244" y="216" font-size="10" fill="#9ca3af">SKU: WLT-001</text>

<rect x="130" y="240" width="540" height="62" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
<rect x="145" y="252" width="32" height="32" rx="6" fill="#f4f5f7"/><text x="161" y="273" font-size="12" fill="#9ca3af" text-anchor="middle" font-weight="700">3</text>
<text x="190" y="266" font-size="12" fill="#1f2937" font-weight="500">Summer Hat</text>
<rect x="278" y="257" width="42" height="18" rx="9" fill="#ecfdf5"/><text x="285" y="270" font-size="9" fill="#10b981" font-weight="500">active</text>
<text x="190" y="286" font-size="10" fill="#9ca3af">$19.99</text>
<text x="244" y="286" font-size="10" fill="#9ca3af" text-decoration="line-through">$24.99</text>
<text x="300" y="286" font-size="10" fill="#9ca3af">SKU: HAT-001</text>
<rect x="398" y="278" width="72" height="18" rx="4" fill="#f4f5f7"/><text x="406" y="290" font-size="9" fill="#6b7280">Accessories</text>
<!-- Separator -->
<line x1="130" y1="320" x2="670" y2="320" stroke="#e5e7eb"/>
<!-- Action buttons -->
<rect x="500" y="340" width="70" height="34" rx="8" fill="#ffffff" stroke="#d1d5db"/><text x="535" y="361" font-size="11" fill="#1f2937" text-anchor="middle">Cancel</text>
<rect x="580" y="340" width="90" height="34" rx="8" fill="#10b981"/><text x="625" y="361" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Import 3</text>
<!-- Annotations -->
<circle cx="660" cy="356" r="10" fill="#ef4444"/><text x="660" y="360" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
</svg>
