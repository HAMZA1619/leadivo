<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<circle cx="28" cy="103" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="107" font-size="12" fill="#6b7280">Store</text>
<circle cx="28" cy="139" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="143" font-size="12" fill="#6b7280">Design</text>
<circle cx="28" cy="175" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="179" font-size="12" fill="#6b7280">Products</text>
<circle cx="28" cy="211" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="215" font-size="12" fill="#6b7280">Collections</text>
<circle cx="28" cy="247" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="251" font-size="12" fill="#6b7280">Orders</text>
<circle cx="28" cy="283" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="287" font-size="12" fill="#6b7280">Discounts</text>
<circle cx="28" cy="319" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="323" font-size="12" fill="#6b7280">Markets</text>
<circle cx="28" cy="355" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="359" font-size="12" fill="#6b7280">Integrations</text>
<rect x="8" y="376" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="391" r="4" fill="#10b981"/><text x="42" y="395" font-size="12" fill="#10b981" font-weight="600">Settings</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<text x="200" y="27" font-size="11" fill="#10b981">View store ↗</text>
<!-- Page title -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">Account Settings</text>
<!-- Profile section -->
<text x="210" y="100" font-size="11" font-weight="500" fill="#6b7280">Profile</text>
<rect x="210" y="110" width="560" height="66" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="136" font-size="10" fill="#6b7280">Name</text>
<text x="754" y="136" font-size="11" fill="#1f2937" text-anchor="end">John Doe</text>
<line x1="226" y1="146" x2="754" y2="146" stroke="#f0f0f0"/>
<text x="226" y="166" font-size="10" fill="#6b7280">Email</text>
<text x="754" y="166" font-size="11" fill="#1f2937" text-anchor="end">you@example.com</text>
<!-- Billing section -->
<text x="210" y="200" font-size="11" font-weight="500" fill="#6b7280">Billing</text>
<rect x="210" y="210" width="560" height="100" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="226" y="236" font-size="10" fill="#6b7280">Status</text>
<rect x="706" y="224" width="48" height="18" rx="9" fill="#fef3c7"/><text x="730" y="237" font-size="9" fill="#d97706" text-anchor="middle">Trialing</text>
<line x1="226" y1="248" x2="754" y2="248" stroke="#f0f0f0"/>
<text x="226" y="268" font-size="10" fill="#6b7280">Trial days left</text>
<text x="754" y="268" font-size="11" fill="#1f2937" font-weight="500" text-anchor="end">10</text>
<line x1="226" y1="278" x2="754" y2="278" stroke="#f0f0f0"/>
<text x="226" y="298" font-size="10" fill="#6b7280">Plan</text>
<text x="754" y="298" font-size="11" fill="#1f2937" text-anchor="end">—</text>
<!-- Subscribe button -->
<rect x="210" y="320" width="560" height="36" rx="8" fill="#10b981"/><text x="490" y="342" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Subscribe to Pro — $19/mo</text>
<!-- Invoices section -->
<text x="210" y="382" font-size="11" font-weight="500" fill="#6b7280">Invoices</text>
<rect x="210" y="392" width="560" height="36" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="490" y="414" font-size="10" fill="#9ca3af" text-anchor="middle">No invoices yet</text>
<!-- Annotations -->
<g class="doc-annotations">
<circle cx="90" cy="391" r="16" fill="#ef4444" opacity="0.10"/><circle cx="90" cy="391" r="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
<rect x="110" y="382" width="37.5" height="17" rx="4" fill="#ef4444"/><text x="115" y="394" font-size="9" fill="#fff" font-weight="600">Click</text>
</g>
</svg>
