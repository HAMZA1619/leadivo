<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<rect x="8" y="124" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="139" r="4" fill="#10b981"/><text x="42" y="143" font-size="12" fill="#10b981" font-weight="600">Products</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<!-- Products page -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">Products</text>
<rect x="570" y="56" width="90" height="32" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="588" y="76" font-size="11" fill="#1f2937">&#8593; Import CSV</text>
<rect x="670" y="56" width="100" height="32" rx="6" fill="#10b981"/><text x="720" y="76" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Add Product</text>
<!-- Import dialog overlay -->
<rect x="200" y="100" width="400" height="320" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5" filter="url(#shadow)"/>
<!-- Dialog header -->
<text x="230" y="132" font-size="14" font-weight="700" fill="#1f2937">Import products from CSV</text>
<text x="570" y="132" font-size="14" fill="#9ca3af">&#10005;</text>
<text x="230" y="152" font-size="10" fill="#6b7280">Upload a CSV file to bulk-import products into your store.</text>
<!-- Upload area -->
<rect x="230" y="168" width="340" height="120" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-dasharray="6 4" stroke-width="1.5"/>
<circle cx="400" cy="210" r="20" fill="#ecfdf5"/><text x="400" y="216" font-size="16" fill="#10b981" text-anchor="middle">&#8593;</text>
<text x="400" y="245" font-size="11" fill="#1f2937" text-anchor="middle" font-weight="500">Click to select a CSV file</text>
<text x="400" y="262" font-size="10" fill="#9ca3af" text-anchor="middle">CSV files only (.csv)</text>
<!-- Download template -->
<line x1="230" y1="300" x2="570" y2="300" stroke="#e5e7eb"/>
<rect x="230" y="312" width="340" height="44" rx="8" fill="#ffffff" stroke="#e5e7eb"/>
<text x="260" y="337" font-size="11" fill="#10b981">&#8595;</text>
<text x="280" y="331" font-size="11" fill="#1f2937" font-weight="500">Download CSV template</text>
<text x="280" y="347" font-size="9" fill="#9ca3af">Sample file with the correct column format.</text>
<!-- Annotations -->
<circle cx="555" cy="72" r="10" fill="#ef4444"/><text x="555" y="76" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<circle cx="615" cy="72" r="16" fill="#ef4444" opacity="0.10"/><circle cx="615" cy="72" r="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
</svg>
