<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs><style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style></defs>
<rect width="800" height="450" fill="#f4f5f7" rx="8"/>
<!-- Sidebar -->
<rect x="0" y="0" width="180" height="450" fill="#ffffff"/><line x1="180" y1="0" x2="180" y2="450" stroke="#e5e7eb"/>
<circle cx="28" cy="67" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="71" font-size="12" fill="#6b7280">Overview</text>
<rect x="8" y="88" width="164" height="30" rx="6" fill="#ecfdf5"/><circle cx="28" cy="103" r="4" fill="#10b981"/><text x="42" y="107" font-size="12" fill="#10b981" font-weight="600">Store</text>
<circle cx="28" cy="139" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="143" font-size="12" fill="#6b7280">Design</text>
<circle cx="28" cy="175" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="179" font-size="12" fill="#6b7280">Products</text>
<circle cx="28" cy="211" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="215" font-size="12" fill="#6b7280">Collections</text>
<circle cx="28" cy="247" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="251" font-size="12" fill="#6b7280">Orders</text>
<circle cx="28" cy="283" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="287" font-size="12" fill="#6b7280">Discounts</text>
<circle cx="28" cy="319" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="323" font-size="12" fill="#6b7280">Markets</text>
<circle cx="28" cy="355" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="359" font-size="12" fill="#6b7280">Integrations</text>
<circle cx="28" cy="391" r="4" fill="#6b7280" opacity="0.5"/><text x="42" y="395" font-size="12" fill="#6b7280">Settings</text>
<!-- Header -->
<rect x="180" y="0" width="620" height="44" fill="#ffffff"/><line x1="180" y1="44" x2="800" y2="44" stroke="#e5e7eb"/>
<text x="200" y="27" font-size="11" fill="#10b981">View store ↗</text>
<!-- Page title -->
<text x="210" y="74" font-size="20" font-weight="700" fill="#1f2937">Store</text>
<rect x="270" y="58" width="86" height="24" rx="12" fill="#d1fae5" stroke="#10b981"/><circle cx="282" cy="70" r="3" fill="#10b981"/><text x="290" y="74" font-size="10" fill="#059669" font-weight="500">Published</text>
<!-- Store form fields (collapsed) -->
<text x="210" y="104" font-size="11" font-weight="500" fill="#6b7280">Store name</text>
<rect x="210" y="112" width="560" height="32" rx="6" fill="#f9fafb" stroke="#e5e7eb"/><text x="224" y="132" font-size="11" fill="#1f2937">My Store</text>
<text x="210" y="162" font-size="11" font-weight="500" fill="#6b7280">Store URL</text>
<rect x="210" y="170" width="560" height="32" rx="6" fill="#f9fafb" stroke="#e5e7eb"/><text x="224" y="190" font-size="11" fill="#6b7280">leadivo.app/</text><text x="302" y="190" font-size="11" fill="#1f2937">my-store</text>
<text x="210" y="220" font-size="11" font-weight="500" fill="#6b7280">Currency</text>
<rect x="210" y="228" width="560" height="32" rx="6" fill="#f9fafb" stroke="#e5e7eb"/><text x="224" y="248" font-size="11" fill="#1f2937">USD — US Dollar</text>
<!-- Separator -->
<line x1="210" y1="280" x2="770" y2="280" stroke="#e5e7eb"/>
<!-- Custom Domain section -->
<text x="210" y="308" font-size="14" font-weight="700" fill="#1f2937">Custom Domain</text>
<text x="210" y="326" font-size="10" fill="#6b7280">Connect your own domain to this store.</text>
<text x="210" y="350" font-size="11" font-weight="500" fill="#1f2937">Domain</text>
<rect x="210" y="358" width="440" height="36" rx="6" fill="#ffffff" stroke="#d1d5db"/><text x="224" y="380" font-size="11" fill="#9ca3af">shop.yourbrand.com</text>
<rect x="660" y="358" width="110" height="36" rx="6" fill="#10b981"/><text x="715" y="380" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="500">Save Domain</text>
<!-- Annotations -->
<g class="doc-annotations">
<circle cx="90" cy="103" r="16" fill="#ef4444" opacity="0.10"/><circle cx="90" cy="103" r="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
<rect x="110" y="94" width="37.5" height="17" rx="4" fill="#ef4444"/><text x="115" y="106" font-size="9" fill="#fff" font-weight="600">Click</text>
<circle cx="197" cy="308" r="10" fill="#ef4444"/><text x="197" y="312" font-size="10" fill="#fff" text-anchor="middle" font-weight="700">1</text>
<rect x="208" y="354" width="564" height="44" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3" rx="8"/>
</g>
</svg>
