<circle cx="705" cy="72" r="16" fill="#ef4444" opacity="0.10"/><circle cx="705" cy="72" r="16" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 2"/>
<rect x="725" y="63" width="37.5" height="17" rx="4" fill="#ef4444"/><text x="730" y="75" font-size="9" fill="#fff" font-weight="600">Click</text>
