<text x="216" y="218" font-size="10" fill="#6b7280">Checkout</text>
<text x="216" y="242" font-size="10" fill="#6b7280">Thank You</text>
<text x="216" y="266" font-size="10" fill="#6b7280">SEO</text>
<text x="216" y="290" font-size="10" fill="#6b7280">Preferences</text>
